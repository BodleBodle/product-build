<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수유실 있는 카페 찾기</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <header>
    <h1>수유실 있는 카페 찾기</h1>
    <div class="theme-switch-container">
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider round"></div>
      </label>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="지역, 카페 이름으로 검색">
      <button id="search-button">검색</button>
    </div>
    <div id="cafe-list" class="cafe-list">
      </div>
    <section class="contact-section">
      <h2>제휴 문의</h2>
      <p>수유실 있는 카페 정보를 공유하거나 제휴를 원하시면 아래 폼을 작성해 주세요.</p>
      <form action="https://formspree.io/f/xbdazqrl" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해 주세요" required></textarea>
        </div>
        <button type="submit" class="submit-button">문의하기</button>
      </form>
    </section>
    <section class="comments-section">
      <h2>댓글</h2>
      <div id="disqus_thread"></div>
    </section>
  </main>
  <footer>
    <p>&copy; 2023 케어존 맵</p>
  </footer>
  <!-- Firebase SDK 추가 -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <!-- main.js를 먼저 로드하여 initMap 함수가 정의되도록 합니다. -->
  <script defer src="main.js"></script>
  <!-- YOUR_API_KEY 부분을 실제 구글 지도 API 키로 교체해야 지도가 정상적으로 작동합니다. -->
  <script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC-eKPsBeitYeEpnSzAzv1Im31MBFkCZU0&callback=initMap"></script>
</body>
</html>
