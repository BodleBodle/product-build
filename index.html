<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수유실 있는 카페 찾기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header>
    <h1>수유실 있는 카페 찾기</h1>
    <div class="theme-switch-container">
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider round"></div>
      </label>
    </div>
  </header>
  <main>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="지역, 카페 이름으로 검색">
      <button id="search-button">검색</button>
    </div>
    <div id="cafe-list" class="cafe-list">
      </div>
    <section class="contact-section">
      <h2>제휴 문의</h2>
      <p>수유실 있는 카페 정보를 공유하거나 제휴를 원하시면 아래 폼을 작성해 주세요.</p>
      <form action="https://formspree.io/f/xbdazqrl" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해 주세요" required></textarea>
        </div>
        <button type="submit" class="submit-button">문의하기</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2023 수유실 있는 카페 찾기</p>
  </footer>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
